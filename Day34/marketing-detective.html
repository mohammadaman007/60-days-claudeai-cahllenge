<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Marketing Detective</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg-0:#0c1016;
  --bg-1:#12171f;
  --bg-2:#1a2029;
  --cork:#1b2129;
  --cork-2:#141a21;
  --paper:#e9e4d8;
  --paper-2:#f4f0e4;
  --ink:#26241f;
  --silver:#c7d0da;
  --silver-dim:#8592a1;
  --accent:#7fd8ff;
  --accent-2:#3fa8d8;
  --accent-glow: rgba(127,216,255,0.55);
  --danger:#ff6b6b;
  --gold:#e0c76f;
  --pin:#c94f4f;
  --shadow: rgba(0,0,0,0.55);
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family: 'Georgia', 'Times New Roman', serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(127,216,255,0.05), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(63,168,216,0.06), transparent 45%),
    var(--bg-0);
  color: var(--silver);
  overflow-x:hidden;
}
#root{min-height:100vh;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-1);}
::-webkit-scrollbar-thumb{background:var(--accent-2);border-radius:6px;}

.app-shell{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* ---------- Header ---------- */
.header-bar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 28px;
  background: linear-gradient(180deg, rgba(20,26,33,0.95), rgba(18,23,31,0.85));
  border-bottom:1px solid rgba(127,216,255,0.15);
  box-shadow: 0 4px 18px var(--shadow);
  position:sticky; top:0; z-index:50;
  backdrop-filter: blur(6px);
}
.brand{
  display:flex; align-items:center; gap:12px;
  font-family: 'Georgia', serif;
  letter-spacing:2px;
}
.brand-badge{
  width:38px;height:38px;border-radius:50%;
  background: radial-gradient(circle at 35% 30%, var(--accent), var(--accent-2) 60%, #0d3a52 100%);
  box-shadow: 0 0 16px var(--accent-glow);
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;color:#0c1016;font-size:18px;
}
.brand-title{font-size:20px;color:var(--paper-2);text-transform:uppercase;}
.brand-sub{font-size:11px;color:var(--silver-dim);letter-spacing:3px;text-transform:uppercase;}

.progress-track{
  flex:1; max-width:420px; margin:0 30px;
  display:flex; gap:6px;
}
.progress-step{
  flex:1; height:6px; border-radius:4px;
  background: rgba(255,255,255,0.08);
  overflow:hidden; position:relative;
}
.progress-step.done{ background: linear-gradient(90deg, var(--accent-2), var(--accent)); box-shadow:0 0 8px var(--accent-glow); }
.progress-step.active{ background: rgba(127,216,255,0.25); }
.progress-step.active::after{
  content:""; position:absolute; inset:0;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: sweep 1.4s ease-in-out infinite;
}
@keyframes sweep{ 0%{transform:translateX(-100%);} 100%{transform:translateX(100%);} }

.case-id-chip{
  font-size:12px; color:var(--silver-dim); letter-spacing:1px;
  border:1px solid rgba(255,255,255,0.15); padding:6px 12px; border-radius:20px;
}

main.stage{
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:36px 20px 60px;
  position:relative;
}

/* paper texture overlay */
.grain{
  position:fixed; inset:0; pointer-events:none; z-index:1000; opacity:0.05; mix-blend-mode:overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ---------- Buttons ---------- */
.btn{
  font-family:'Georgia', serif;
  cursor:pointer; border:none; border-radius:8px;
  padding:12px 26px; font-size:15px; letter-spacing:1px;
  transition: all .25s ease;
  position:relative; overflow:hidden;
}
.btn-primary{
  background: linear-gradient(135deg, var(--accent-2), var(--accent));
  color:#08131a; font-weight:bold;
  box-shadow: 0 4px 18px var(--accent-glow);
}
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 26px var(--accent-glow); }
.btn-ghost{
  background: transparent; color:var(--silver);
  border:1px solid rgba(255,255,255,0.25);
}
.btn-ghost:hover{ border-color:var(--accent); color:var(--accent); }
.btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none !important; box-shadow:none !important;}

/* ---------- Intro / Assignment ---------- */
.intro-wrap{
  max-width:760px; text-align:center; margin-top:40px;
  animation: fadeUp .8s ease;
}
@keyframes fadeUp{ from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);} }
.intro-wrap h1{
  font-size:42px; color:var(--paper-2); margin-bottom:6px; text-shadow:0 0 24px rgba(127,216,255,0.25);
}
.intro-wrap p.lead{ color:var(--silver-dim); font-size:16px; margin-bottom:34px; line-height:1.6;}

.folder{
  background: linear-gradient(160deg, #caa96b, #a9853f);
  border-radius:6px 12px 12px 12px;
  padding:26px 30px; text-align:left; position:relative;
  box-shadow: 0 20px 40px var(--shadow), inset 0 0 0 2px rgba(0,0,0,0.15);
  color:#2b1f0d;
  transform: rotate(-1deg);
  margin-bottom:30px;
}
.folder::before{
  content:"CASE FILE"; position:absolute; top:-16px; left:24px;
  background:#8a6a2f; color:#fff2d6; font-size:11px; letter-spacing:3px;
  padding:5px 14px; border-radius:4px 4px 0 0; box-shadow:0 -2px 6px rgba(0,0,0,0.3);
}
.folder h2{ margin:6px 0 4px; font-size:26px;}
.folder .sub{ font-size:13px; opacity:0.75; margin-bottom:12px;}
.stamp{
  position:absolute; right:24px; top:20px; border:3px solid #a33; color:#a33;
  padding:4px 10px; font-weight:bold; letter-spacing:2px; font-size:13px;
  transform: rotate(8deg); border-radius:6px; opacity:0.85;
}

/* ---------- Corkboard / investigation ---------- */
.corkboard{
  width:100%; max-width:1200px;
  background:
    radial-gradient(circle at 10% 10%, rgba(255,255,255,0.03), transparent 40%),
    repeating-linear-gradient(0deg, var(--cork), var(--cork) 2px, var(--cork-2) 2px, var(--cork-2) 4px);
  border-radius:14px;
  border: 10px solid #2c2115;
  box-shadow: 0 30px 60px var(--shadow), inset 0 0 60px rgba(0,0,0,0.5);
  padding:30px;
  position:relative;
  min-height:560px;
}
.corkboard-title{
  color: var(--gold); text-transform:uppercase; letter-spacing:3px; font-size:13px;
  margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.corkboard-title::before{ content:"🔎"; }

.board-grid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap:22px;
}

.note{
  background: var(--paper);
  color: var(--ink);
  border-radius:2px;
  padding:16px 16px 20px;
  box-shadow: 0 12px 22px rgba(0,0,0,0.45);
  position:relative;
  cursor:grab;
  transition: transform .2s ease, box-shadow .2s ease;
  font-size:13.5px;
  line-height:1.5;
  min-height:150px;
}
.note:hover{ transform: translateY(-6px) rotate(0deg) !important; box-shadow: 0 18px 30px rgba(0,0,0,0.55); z-index:5;}
.note:active{ cursor:grabbing; }
.note h4{
  margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:1px; color:#5a4a1f;
  border-bottom:1px dashed rgba(0,0,0,0.2); padding-bottom:6px;
}
.note.rot1{ transform: rotate(-2deg); }
.note.rot2{ transform: rotate(1.5deg); }
.note.rot3{ transform: rotate(-1deg); }
.note.rot4{ transform: rotate(2deg); }

.pin{
  position:absolute; top:-10px; left:50%; transform:translateX(-50%);
  width:16px; height:16px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #ff8b8b, var(--pin) 70%);
  box-shadow: 0 3px 6px rgba(0,0,0,0.6);
}
.note.examined{
  box-shadow: 0 0 0 3px var(--accent), 0 18px 30px rgba(0,0,0,0.55);
}
.note .tag-found{
  position:absolute; bottom:8px; right:10px; font-size:10px; color:var(--accent-2); letter-spacing:1px;
}

.metric-row{ display:flex; justify-content:space-between; font-size:12.5px; padding:2px 0;}
.metric-row b{ color:#2b1f0d; }

/* clue reveal card */
.clue-reveal{
  margin-top:26px; width:100%; max-width:1200px;
  background: linear-gradient(180deg, rgba(26,32,41,0.9), rgba(18,23,31,0.9));
  border:1px solid rgba(127,216,255,0.2);
  border-radius:14px; padding:22px 26px;
  box-shadow: 0 10px 30px var(--shadow);
  animation: fadeUp .5s ease;
}
.clue-reveal h3{ color:var(--accent); margin-top:0; letter-spacing:1px; font-size:15px; text-transform:uppercase;}

/* ---------- suspect / evidence chips ---------- */
.evidence-tray{
  margin-top:26px; width:100%; max-width:1200px;
  display:flex; flex-wrap:wrap; gap:14px;
  padding:18px; border-radius:12px;
  background: rgba(255,255,255,0.02);
  border:1px dashed rgba(255,255,255,0.15);
  min-height:70px;
}
.evidence-chip{
  background: var(--bg-2); border:1px solid rgba(127,216,255,0.25);
  color:var(--silver); padding:10px 16px; border-radius:20px; font-size:13px;
  display:flex; align-items:center; gap:8px; box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
.evidence-chip .dot{ width:8px;height:8px;border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent-glow);}

/* ---------- Solve panel ---------- */
.solve-wrap{ width:100%; max-width:900px; margin-top:10px; animation:fadeUp .6s ease;}
.solve-wrap h2{ color:var(--paper-2); text-align:center; margin-bottom:4px;}
.solve-wrap p.hint{ text-align:center; color:var(--silver-dim); margin-bottom:26px;}
.option-list{ display:flex; flex-direction:column; gap:14px; }
.option-card{
  background: var(--bg-2);
  border:1px solid rgba(255,255,255,0.1);
  padding:16px 20px; border-radius:10px; cursor:pointer;
  transition: all .2s ease; font-size:14.5px; line-height:1.5;
  display:flex; gap:14px; align-items:flex-start;
}
.option-card:hover{ border-color:var(--accent); background: rgba(127,216,255,0.06); transform: translateX(4px);}
.option-card.selected{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 0 20px var(--accent-glow); }
.option-card.correct{ border-color:#5fd68a; box-shadow:0 0 0 1px #5fd68a, 0 0 20px rgba(95,214,138,0.4); }
.option-card.wrong{ border-color:var(--danger); box-shadow:0 0 0 1px var(--danger), 0 0 20px rgba(255,107,107,0.35); }
.opt-letter{
  width:28px;height:28px;border-radius:50%; background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center; font-size:13px; flex-shrink:0; font-weight:bold;
}

/* ---------- Case Closed ---------- */
.case-closed-wrap{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; text-align:center;
}
.stamp-big{
  font-size:64px; color:var(--danger); border:6px solid var(--danger);
  padding:14px 40px; border-radius:12px; letter-spacing:6px; font-weight:bold;
  transform: rotate(-8deg) scale(0.4); opacity:0;
  animation: stampIn .6s cubic-bezier(.2,1.4,.4,1) forwards .15s;
  text-transform:uppercase;
  box-shadow: 0 0 40px rgba(255,107,107,0.35);
}
@keyframes stampIn{ 0%{transform: rotate(-8deg) scale(2.4); opacity:0;} 60%{opacity:1;} 100%{transform: rotate(-8deg) scale(1); opacity:1;} }
.case-closed-wrap .verdict{
  margin-top:26px; font-size:18px; color:var(--silver); max-width:600px;
}
.case-closed-wrap .score{
  margin-top:16px; font-size:15px; color: var(--gold);
}

/* ---------- Learning Report ---------- */
.report-wrap{ width:100%; max-width:900px; animation:fadeUp .6s ease;}
.report-card{
  background: var(--paper); color:var(--ink); border-radius:10px; padding:28px 30px;
  box-shadow: 0 20px 40px var(--shadow); margin-bottom:22px;
}
.report-card h3{ margin-top:0; color:#4a3a10; text-transform:uppercase; letter-spacing:1px; font-size:14px; border-bottom:2px solid rgba(0,0,0,0.15); padding-bottom:8px;}
.report-list{ margin:0; padding-left:20px; }
.report-list li{ margin-bottom:8px; line-height:1.5; }

.bar-chart{ display:flex; align-items:flex-end; gap:14px; height:160px; padding-top:20px;}
.bar{
  flex:1; background: linear-gradient(180deg, var(--accent), var(--accent-2));
  border-radius:6px 6px 0 0; position:relative;
  animation: growBar 1s ease forwards; transform-origin:bottom; transform:scaleY(0);
  box-shadow: 0 0 14px var(--accent-glow);
}
@keyframes growBar{ to{ transform:scaleY(1);} }
.bar .val{ position:absolute; top:-22px; left:0; right:0; text-align:center; font-size:12px; color:var(--silver);}
.bar .lbl{ position:absolute; bottom:-22px; left:0; right:0; text-align:center; font-size:11px; color:var(--silver-dim);}
.chart-wrap{ margin:30px 0 40px; }

.actions-row{ display:flex; gap:14px; justify-content:center; margin-top:30px; flex-wrap:wrap;}

/* ---------- theme picker (in-app switch, optional) ---------- */
.footer-note{
  text-align:center; color:var(--silver-dim); font-size:11px; padding:18px; letter-spacing:1px;
}

@media (max-width: 700px){
  .header-bar{ flex-direction:column; gap:12px; align-items:flex-start;}
  .progress-track{ width:100%; margin:0; max-width:none;}
  .intro-wrap h1{ font-size:30px;}
  .corkboard{ padding:16px;}
  .stamp-big{ font-size:38px; padding:10px 22px;}
}
</style>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useRef} = React;

/* ============ CASE DATA ============ */
const CASES = [
[
  {
  company: "LumenBrew Coffee Co.",
  industry: "Food & Beverage",
  objective: "Drive foot traffic to 12 new urban cafe locations within Q1.",
  audience: "Urban professionals, ages 24-40, commuters, remote workers.",
  channels: ["Instagram Ads", "Local Radio", "Influencer Partnerships", "In-store Signage"],
  budget: {"Instagram Ads":35,"Local Radio":25,"Influencer Partnerships":30,"In-store Signage":10},
  metrics: {reach:"1.2M", ctr:"0.8%", engagement:"3.4%", conversions:"1,120", sales:"$41,000"},
  comments: [
    "\"Saw the ad three times but had no idea there was a store near me.\"",
    "\"Cute posts, but where do I even find this place?\"",
    "\"I follow them on Instagram but never got a coupon or reason to visit.\""
  ],
  social: "High likes and shares on aesthetic reels, but almost zero location tags or check-ins from real customers.",
  mistake: "The campaign focused entirely on broad brand-awareness content without any geo-targeted call-to-action or store-locator integration.",
  clues: [
    "CTR is unusually low for a visually engaging Instagram campaign, suggesting the ad creative isn't driving action, just admiration.",
    "Customer comments repeatedly mention not knowing where locations are.",
    "In-store signage received only 10% of budget despite being the only channel connected to physical foot traffic."
  ],
  explanation: "The brand invested heavily in visually pleasing awareness content but never closed the loop between digital engagement and physical store visits. Without geo-targeted ads, location tags, or a locator tool, engaged followers had no clear path to the nearest cafe.",
  improvements: [
    "Add geo-targeted ads with embedded store-locator links.",
    "Include limited-time opening offers tied to specific locations.",
    "Encourage location check-ins with a small loyalty incentive."
  ]
  },
  {
  company: "Verdant Home Goods",
  industry: "E-commerce / Home Decor",
  objective: "Increase online sales of a new sustainable furniture line by 20%.",
  audience: "Eco-conscious millennials furnishing first homes.",
  channels: ["Google Search Ads", "Email Newsletter", "Pinterest", "Blog SEO"],
  budget: {"Google Search Ads":40,"Email Newsletter":15,"Pinterest":25,"Blog SEO":20},
  metrics: {reach:"860K", ctr:"4.1%", engagement:"2.1%", conversions:"640", sales:"$58,000"},
  comments: [
    "\"Clicked the ad, loved the couch, but shipping cost more than the couch!\"",
    "\"Added to cart, saw the extra fees at checkout and left.\"",
    "\"Great products, terrible surprise at the end.\""
  ],
  social: "Pinterest boards were saved thousands of times, but comments frequently mention 'checkout' complaints.",
  mistake: "Hidden shipping and handling fees were only revealed at final checkout, causing high cart abandonment despite strong upper-funnel interest.",
  clues: [
    "CTR is strong (4.1%) showing ads and creative are effective at attracting interest.",
    "Conversions are low relative to reach and CTR, pointing to a late-funnel drop-off rather than an awareness problem.",
    "Multiple customer comments specifically cite checkout costs, not product dissatisfaction."
  ],
  explanation: "This is a classic cart-abandonment case caused by price transparency failure. The marketing funnel worked perfectly until the final step, where undisclosed shipping fees broke customer trust right before purchase.",
  improvements: [
    "Display estimated shipping costs on the product page, not just at checkout.",
    "Offer free shipping thresholds to reduce sticker shock.",
    "Retarget cart-abandoners with a limited-time shipping discount."
  ]
  },
  {
  company: "PulseFit Wearables",
  industry: "Consumer Tech / Fitness",
  objective: "Launch a new fitness tracker to compete with established brands.",
  audience: "Fitness enthusiasts aged 18-35, tech-savvy early adopters.",
  channels: ["YouTube Pre-roll", "TikTok Ads", "Affiliate Marketing", "Podcast Sponsorships"],
  budget: {"YouTube Pre-roll":30,"TikTok Ads":30,"Affiliate Marketing":20,"Podcast Sponsorships":20},
  metrics: {reach:"3.4M", ctr:"1.9%", engagement:"6.8%", conversions:"2,900", sales:"$210,000"},
  comments: [
    "\"Ordered mine and it just says 'processing' for 3 weeks now.\"",
    "\"Great hype video but the app crashes constantly.\"",
    "\"Wish I knew about the battery issues before I bought two.\""
  ],
  social: "Extremely high initial buzz and pre-order excitement, followed by a sharp wave of negative reviews and refund requests two weeks post-launch.",
  mistake: "The marketing campaign drastically outpaced the product's actual readiness, generating demand faster than manufacturing and software QA could support.",
  clues: [
    "Engagement (6.8%) and conversions are both excellent, showing the campaign itself was highly effective at persuasion.",
    "Comments consistently reference fulfillment delays and app bugs rather than marketing dissatisfaction.",
    "The spike in negative sentiment occurs after purchase, not during the ad exposure phase."
  ],
  explanation: "The marketing team did their job too well relative to operational readiness. Overpromising through hype-driven content created expectations that supply chain and software teams couldn't meet, damaging brand trust immediately after a successful launch.",
  improvements: [
    "Align campaign intensity with confirmed inventory and QA sign-off.",
    "Use a phased rollout (limited drops) to manage demand versus supply.",
    "Set honest shipping expectations in marketing messaging."
  ]
  },
  {
  company: "Bellamie Skincare",
  industry: "Beauty & Cosmetics",
  objective: "Build brand credibility for a new anti-aging serum.",
  audience: "Women aged 35-55 interested in premium skincare.",
  channels: ["Facebook Ads", "Influencer Reviews", "Print Magazine", "Email"],
  budget: {"Facebook Ads":30,"Influencer Reviews":35,"Print Magazine":20,"Email":15},
  metrics: {reach:"1.5M", ctr:"1.2%", engagement:"2.9%", conversions:"410", sales:"$36,000"},
  comments: [
    "\"Every influencer says something different about what's actually in this.\"",
    "\"One post says clinically proven, another says all-natural — which is it?\"",
    "\"Feels like nobody who's promoting this actually uses it.\""
  ],
  social: "Influencer content shows wide inconsistency in claims and tone; several posts contradict the brand's own website messaging.",
  mistake: "Inconsistent and contradictory messaging across influencer partners undermined brand credibility and consumer trust.",
  clues: [
    "Reach is high but conversions are disproportionately low, indicating a trust or clarity issue rather than a visibility issue.",
    "Comments explicitly mention conflicting claims between influencers.",
    "Engagement is mostly questions and skepticism rather than positive sentiment."
  ],
  explanation: "Without a unified messaging brief, influencers described the product using inconsistent, sometimes contradictory claims, eroding the very credibility the campaign was meant to build.",
  improvements: [
    "Create a strict messaging and claims guide for all influencer partners.",
    "Vet content before it goes live to ensure consistency.",
    "Feature real dermatologist or lab-backed claims uniformly across channels."
  ]
  },
  {
  company: "TrailForge Outdoor Gear",
  industry: "Retail / Outdoor Equipment",
  objective: "Increase repeat purchases through a new loyalty program.",
  audience: "Outdoor adventurers, hikers, campers, ages 25-50.",
  channels: ["SMS Marketing", "App Push Notifications", "Retargeting Ads", "In-store Kiosk"],
  budget: {"SMS Marketing":25,"App Push Notifications":25,"Retargeting Ads":35,"In-store Kiosk":15},
  metrics: {reach:"520K", ctr:"2.5%", engagement:"1.1%", conversions:"890", sales:"$52,000"},
  comments: [
    "\"I get like 5 texts a day now, I'm unsubscribing.\"",
    "\"The push notifications are nonstop, I muted the app entirely.\"",
    "\"Cool rewards but I turned off notifications so I never see them.\""
  ],
  social: "Spike in app uninstalls and SMS opt-outs shortly after loyalty program launch.",
  mistake: "Over-frequent messaging across SMS and push channels caused customer fatigue, leading to mass opt-outs and muted engagement.",
  clues: [
    "Engagement rate is unusually low (1.1%) despite decent reach, suggesting message fatigue rather than lack of interest.",
    "Comments explicitly describe excessive message frequency, not poor offers.",
    "Opt-out and uninstall spikes align directly with the loyalty program's launch date."
  ],
  explanation: "The loyalty program's frequent multi-channel touchpoints were designed to maximize visibility but instead triggered notification fatigue, pushing customers to disengage entirely rather than driving repeat purchases.",
  improvements: [
    "Implement frequency capping across SMS and push channels.",
    "Let customers choose preferred channels and frequency.",
    "Use behavioral triggers instead of blanket blasts."
  ]
  },
  {
  company: "Nimbus Cloud Storage",
  industry: "SaaS / B2B Technology",
  objective: "Generate qualified leads for enterprise cloud storage plans.",
  audience: "IT decision-makers at mid-to-large companies.",
  channels: ["LinkedIn Ads", "Webinars", "Whitepapers", "Google Display Network"],
  budget: {"LinkedIn Ads":40,"Webinars":25,"Whitepapers":20,"Google Display Network":15},

// Ensure at least 10-15 distinct cases exist; duplicate-safe id assignment
const ALL_CASES = CASES.map((c, i) => ({...c, id: i+1, caseNumber: `MK-${String(1000+i)}`}));

/* ============ HELPERS ============ */
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandomCase(excludeId){
  let pool = ALL_CASES;
  if(excludeId != null && ALL_CASES.length > 1){
    pool = ALL_CASES.filter(c=>c.id !== excludeId);
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildOptions(correctCase){
  // Build 4 plausible options: correct + 3 distractors from other cases' mistakes
  const others = shuffle(ALL_CASES.filter(c=>c.id !== correctCase.id)).slice(0,3);
  const options = shuffle([
    {text: correctCase.mistake, correct:true},
    ...others.map(o=>({text:o.mistake, correct:false}))
  ]);
  return options;
}

function DraggableClue({clue, index, onCollect, collected}){
  const ref = useRef(null);
  const [pos, setPos] = useState(null);
  const dragData = useRef({dragging:false, offX:0, offY:0});

  const onPointerDown = (e)=>{
    const rect = ref.current.getBoundingClientRect();
    dragData.current = {dragging:true, offX: e.clientX-rect.left, offY: e.clientY-rect.top};
    ref.current.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e)=>{
    if(!dragData.current.dragging) return;
    const parentRect = ref.current.parentElement.getBoundingClientRect();
    let x = e.clientX - parentRect.left - dragData.current.offX;
    let y = e.clientY - parentRect.top - dragData.current.offY;
    setPos({x,y});
  };
  const onPointerUp = (e)=>{
    if(!dragData.current.dragging) return;
    dragData.current.dragging = false;
    // if dragged down into "tray zone" (simulate by y > 40) collect it
    onCollect(index);
  };

  const style = pos ? {position:"absolute", left:pos.x, top:pos.y, zIndex:20, width:210} : {width:"100%"};

  return (
    <div
      ref={ref}
      className={"note rot" + ((index%4)+1)}
      style={style}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      title="Drag me to the evidence tray"
    >
      <div className="pin"></div>
      <h4>Supporting Clue #{index+1}</h4>
      <div>{clue}</div>
      {collected && <div className="tag-found">collected ✓</div>}
    </div>
  );
}

  };

  return (
    <div className="corkboard">
      <div className="corkboard-title">Deep Investigation — drag each clue down to the evidence tray</div>
      <p style={{color:"var(--silver-dim)", marginTop:-6, marginBottom:22, fontSize:13}}>

      </p>
      <div style={{display:"flex", gap:24, flexWrap:"wrap", position:"relative", minHeight:200}}>
        {caseData.clues.map((clue,idx)=>(
          <DraggableClue key={idx} clue={clue} index={idx} onCollect={handleCollect} collected={collected[idx]} />
        ))}
      </div>

      <div className="evidence-tray">
        {collectedCount===0 && <span style={{color:"var(--silver-dim)", fontSize:13}}>Evidence tray — drag clues here...</span>}
        {Object.keys(collected).map(idx=>(

          </div>
        ))}
      </div>

      <div style={{textAlign:"center", marginTop:28}}>
        <button className="btn btn-primary" disabled={collectedCount < caseData.clues.length} onClick={onSolve}>
          {collectedCount < caseData.clues.length ? `Collect All Clues (${collectedCount}/${caseData.clues.length})` : "I'm Ready To Solve This →"}
        </button>
      </div>
    </div>
  );
}

function SolveCase({caseData, onSolved}){
  const [options] = useState(()=>buildOptions(caseData));
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  const submit = ()=>{
    if(selected==null) return;
    setRevealed(true);
    setTimeout(()=>{
      onSolved(options[selected].correct);
    }, 1800);
  };

  return (
    <div className="solve-wrap">
      <h2>What Really Happened?</h2>
      <p className="hint">Choose the explanation that best identifies the primary marketing mistake in the {caseData.company} case.</p>
      <div className="option-list">
        {options.map((opt,i)=>{
          let cls = "option-card";
          if(selected===i) cls += " selected";
          if(revealed && opt.correct) cls += " correct";
          if(revealed && selected===i && !opt.correct) cls += " wrong";
          return (
            <div key={i} className={cls} onClick={()=>!revealed && setSelected(i)}>
              <div className="opt-letter">{String.fromCharCode(65+i)}</div>
              <div>{opt.text}</div>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:"center", marginTop:26}}>
        <button className="btn btn-primary" disabled={selected==null || revealed} onClick={submit}>
          {revealed ? "Case Being Filed..." : "Submit Verdict"}
        </button>
      </div>
    </div>
  );
}

function CaseClosed({correct, caseData, onContinue}){
  useEffect(()=>{
    const t = setTimeout(onContinue, 2600);
    return ()=>clearTimeout(t);
  },[]);
  return (
    <div className="case-closed-wrap">
      <div className="stamp-big">{correct ? "Case Closed" : "Case Reopened"}</div>
      <div className="verdict">
        {correct
          ? `Sharp work, detective. You correctly identified the flaw behind ${caseData.company}'s underperforming campaign.`
          : `Not quite — but every good detective misreads a clue now and then. Let's review what the evidence really showed.`}
      </div>
      <div className="score">Preparing your Learning Report...</div>
    </div>
  );
}

  const pct = Math.max(6, Math.round((value/max)*100));
  return (
    <div className="bar" style={{height: pct + "%"}}>
      <div className="val">{value}</div>
      <div className="lbl">{label}</div>
    </div>
  );
}

function parseMetricNumber(str){
  const n = parseFloat(String(str).replace(/[^0-9.]/g,""));
  return isNaN(n) ? 0 : n;
}

  const m = caseData.metrics;
  const chartData = [
    {label:"Reach(K)", value: Math.round(parseMetricNumber(m.reach) / ( /M/.test(m.reach) ? 0.001 : 1 ) ) || parseMetricNumber(m.reach)},
  ];
  // Simpler: normalize by presenting relative bars using raw parsed numbers scaled
  const reachNum = /M/i.test(m.reach) ? parseMetricNumber(m.reach)*1000 : parseMetricNumber(m.reach);
  const ctrNum = parseMetricNumber(m.ctr);
  const engNum = parseMetricNumber(m.engagement);
  const convNum = parseMetricNumber(m.conversions.toString().replace(/,/g,""));
  const bars = [
    {label:"Reach(K)", value: Math.round(reachNum), max: Math.max(reachNum,1)},
    {label:"CTR %", value: ctrNum, max: Math.max(ctrNum*2,1)},
    {label:"Engage %", value: engNum, max: Math.max(engNum*2,1)},
    {label:"Conversions", value: convNum, max: Math.max(convNum*1.4,1)},
  ];
  const globalMax = Math.max(...bars.map(b=>b.max));

  return (
    <div className="report-wrap">
      <div className="report-card">
        <h3>Verdict</h3>
        <p style={{marginTop:0}}>{correct ? "✅ You correctly diagnosed the case." : "❌ Your initial theory missed the mark — here's the real story."}</p>
        <p><b>The Primary Mistake:</b> {caseData.mistake}</p>
      </div>

      <div className="report-card">
        <h3>Full Explanation</h3>
        <p style={{marginTop:0}}>{caseData.explanation}</p>
      </div>

      <div className="report-card">
        <h3>Supporting Clues Revisited</h3>
        <ul className="report-list">
          {caseData.clues.map((c,i)=>(<li key={i}>{c}</li>))}
        </ul>
      </div>

      <div className="report-card">
        <h3>Campaign Metrics Snapshot</h3>
        <div className="chart-wrap">
          <div className="bar-chart">
            {bars.map((b,i)=>(
              <AnimatedBar key={i} label={b.label} value={b.value} max={globalMax} />
            ))}
          </div>
        </div>
      </div>

      <div className="report-card">
        <h3>Suggested Improvements</h3>
        <ul className="report-list">
          {caseData.improvements.map((im,i)=>(<li key={i}>{im}</li>))}
        </ul>
      </div>

      <div className="actions-row">
        <button className="btn btn-primary" onClick={onReplay}>Take On A New Case →</button>
      </div>
    </div>
  );
}

/* ============ APP ROOT ============ */
function App(){
  const [phase, setPhase] = useState(0); // 0 assignment,1 board,2 investigation,3 solve,4 closed,5 report
  const [caseData, setCaseData] = useState(null);
  const [wasCorrect, setWasCorrect] = useState(false);

  const acceptCase = (c)=>{
    setCaseData(c);
    setPhase(1);
  };

  const restart = ()=>{
    setCaseData(null);
    setWasCorrect(false);
    setPhase(0);
  };

  return (
    <div className="app-shell">
      <Header step={phase} caseNumber={caseData ? caseData.caseNumber : null} />
      <main className="stage">
        {phase===0 && <Assignment onAccept={acceptCase} />}
        {phase===1 && caseData && <InvestigationBoard caseData={caseData} onProceed={()=>setPhase(2)} />}
        {phase===2 && caseData && <DeepInvestigation caseData={caseData} onSolve={()=>setPhase(3)} />}
        {phase===3 && caseData && <SolveCase caseData={caseData} onSolved={(correct)=>{ setWasCorrect(correct); setPhase(4); }} />}
        {phase===4 && caseData && <CaseClosed correct={wasCorrect} caseData={caseData} onContinue={()=>setPhase(5)} />}
        {phase===5 && caseData && <LearningReport caseData={caseData} correct={wasCorrect} onReplay={restart} />}
      </main>
      <div className="footer-note">MARKETING DETECTIVE BUREAU · Every campaign tells a story · Case files are fictional</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
