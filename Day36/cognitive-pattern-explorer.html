<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cognitive Pattern Explorer</title>
<meta name="description" content="An offline, self-reflection exploration of your thinking patterns." />
<style>
  :root{
    --bg-0:#0e2024;
    --bg-1:#123039;
    --bg-2:#1a3d42;
    --paper: 247,245,240;
    --ink:#f2efe6;
    --ink-dim:#b9c9c6;
    --ink-faint:#7d928f;
    --accent:#8fb89d;
    --accent-strong:#c9e0cd;
    --accent2:#e8a657;
    --line: rgba(255,255,255,0.10);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;
    --speed: 1;
    --ease: cubic-bezier(.22,.61,.36,1);
    --shadow-soft: 0 20px 60px -20px rgba(0,0,0,0.55);
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-label: var(--font-body);
  }

  .theme-stress{
    --accent:#e2895a;
    --accent-strong:#f6c9a2;
    --accent2:#f2c14e;
    --speed: 1.7;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    min-height:100%;
    background:
      radial-gradient(1200px 800px at 15% -10%, var(--bg-2), transparent 60%),
      radial-gradient(900px 700px at 110% 20%, var(--bg-2), transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-0));
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  #bg-canvas{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; pointer-events:none;
    opacity:0.55;
  }

  #app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
  }

  /* Progress rail */
  #progress-rail{
    position:sticky; top:0; z-index:5;
    padding: 14px clamp(16px,4vw,40px) 0;
  }
  #progress-track{
    height:4px; border-radius:4px;
    background: rgba(255,255,255,0.08);
    overflow:hidden;
    max-width:920px; margin:0 auto;
  }
  #progress-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s var(--ease);
    border-radius:4px;
  }
  #progress-meta{
    max-width:920px; margin:8px auto 0;
    display:flex; justify-content:space-between;
    font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--ink-faint);
  }
  #sub-dots{ display:flex; gap:6px; }
  #sub-dots span{
    width:6px; height:6px; border-radius:50%;
    background: rgba(255,255,255,0.18);
    display:inline-block;
    transition: background .3s var(--ease), transform .3s var(--ease);
  }
  #sub-dots span.on{ background:var(--accent); transform:scale(1.25); }

  main{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    padding: 24px clamp(16px,4vw,40px) 60px;
  }

  #screen{
    width:100%; max-width:920px;
    animation: fadeUp .55s var(--ease);
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .eyebrow{
    font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--accent-strong); opacity:0.9; margin:0 0 10px;
    font-family: var(--font-label); font-weight:600;
  }
  h1,h2,h3{ font-family:var(--font-display); font-weight:500; line-height:1.15; margin:0 0 14px; }
  h1{ font-size: clamp(1.9rem, 4.4vw, 2.8rem); }
  h2{ font-size: clamp(1.5rem, 3.2vw, 2.1rem); }
  h3{ font-size: 1.15rem; }
  p{ line-height:1.65; color:var(--ink-dim); margin:0 0 16px; }
  .lede{ color:var(--ink); font-size:1.08rem; }

  .card{
    background: rgba(var(--paper), 0.05);
    border:1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: clamp(20px,4vw,36px);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow-soft);
  }

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:var(--font-label); font-size:0.95rem; font-weight:600;
    padding: 13px 26px; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#12211f;
    transition: transform .25s var(--ease), box-shadow .25s var(--ease), filter .25s var(--ease);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
  }
  .btn:hover{ transform: translateY(-2px); filter:brightness(1.05); }
  .btn:active{ transform: translateY(0); }
  .btn.ghost{
    background:transparent; color:var(--ink);
    border:1px solid var(--line); box-shadow:none;
  }
  .btn.ghost:hover{ border-color: var(--accent); color:var(--accent-strong); }
  .btn:focus-visible, .drag-item:focus-visible, .option-card:focus-visible, .slider-knob:focus-visible, .mode-btn:focus-visible, .icon-btn:focus-visible{
    outline: 2px solid var(--accent-strong); outline-offset:3px;
  }
  .btn[disabled]{ opacity:0.4; cursor:not-allowed; filter:grayscale(0.3); }

  .row{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .row.between{ justify-content:space-between; }
  .row.end{ justify-content:flex-end; }
  .spacer{ height: 26px; }

  /* Start screen */
  .hero-mark{
    width:64px; height:64px; margin-bottom:18px;
    display:flex; align-items:center; justify-content:center;
  }
  .mode-picker{
    display:flex; gap:12px; margin: 22px 0 30px;
    flex-wrap:wrap;
  }
  .mode-btn{
    flex:1; min-width:180px;
    text-align:left; cursor:pointer;
    border:1px solid var(--line); border-radius: var(--radius-md);
    background: rgba(var(--paper),0.04);
    padding:16px 18px; color:var(--ink);
    font-family:var(--font-body);
    transition: border-color .25s var(--ease), background .25s var(--ease), transform .2s var(--ease);
  }
  .mode-btn:hover{ transform: translateY(-2px); }
  .mode-btn strong{ display:block; font-size:1rem; margin-bottom:4px; }
  .mode-btn span.desc{ font-size:0.85rem; color:var(--ink-faint); }
  .mode-btn.selected{ border-color: var(--accent); background: rgba(143,184,157,0.12); }
  .mode-btn .dot{
    width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px;
    background: var(--ink-faint);
  }
  .mode-btn.selected .dot{ background: var(--accent); }

  /* Options */
  .options{ display:grid; gap:12px; margin-top:22px; }
  .option-card{
    text-align:left; cursor:pointer;
    border:1px solid var(--line); border-radius: var(--radius-md);
    background: rgba(var(--paper),0.035);
    padding:16px 18px; color:var(--ink); font-family:var(--font-body); font-size:0.98rem;
    transition: border-color .22s var(--ease), background .22s var(--ease), transform .18s var(--ease);
    line-height:1.5;
  }
  .option-card:hover{ border-color: var(--accent); transform: translateX(3px); }
  .option-card.chosen{ border-color: var(--accent); background: rgba(143,184,157,0.14); }
  .option-letter{
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%; margin-right:10px;
    background: rgba(255,255,255,0.08); font-size:0.75rem; font-weight:700;
    color:var(--accent-strong); vertical-align:middle;
  }

  /* Chapter 2: draggable priority list */
  #priority-list{ list-style:none; margin: 22px 0 8px; padding:0; display:flex; flex-direction:column; gap:10px; }
  .drag-item{
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line); border-radius: var(--radius-md);
    background: rgba(var(--paper),0.045);
    padding:14px 16px; cursor:grab;
    touch-action:none;
    transition: border-color .2s var(--ease), background .2s var(--ease);
  }
  .drag-item.dragging{ opacity:0.55; border-color:var(--accent); cursor:grabbing; }
  .drag-rank{
    font-family:var(--font-display); font-size:1.1rem; color:var(--accent-strong);
    width:28px; text-align:center; flex-shrink:0;
  }
  .drag-grip{
    width:18px; height:18px; flex-shrink:0; opacity:0.55;
    background-image: radial-gradient(circle, var(--ink) 1.3px, transparent 1.4px);
    background-size: 6px 6px;
  }
  .drag-label{ flex:1; font-size:0.98rem; }
  .drag-label small{ display:block; color:var(--ink-faint); font-size:0.78rem; margin-top:2px; }
  .icon-btn{
    appearance:none; border:1px solid var(--line); background:transparent; color:var(--ink-dim);
    width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:0.9rem; line-height:1;
    transition: border-color .2s var(--ease), color .2s var(--ease);
  }
  .icon-btn:hover{ border-color:var(--accent); color:var(--accent-strong); }

  /* Chapter 3: sliders */
  .spectrum{ margin: 26px 0; }
  .spectrum-labels{
    display:flex; justify-content:space-between; font-size:0.82rem; color:var(--ink-faint);
    margin-bottom:10px;
  }
  .spectrum-prompt{ font-size:0.95rem; color:var(--ink); margin-bottom:10px; }
  .slider-track{
    position:relative; height:8px; border-radius:8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.14), rgba(255,255,255,0.06));
    cursor:pointer;
  }
  .slider-fill{
    position:absolute; top:0; left:0; height:100%; border-radius:8px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity:0.45;
  }
  .slider-knob{
    position:absolute; top:50%; width:24px; height:24px; margin-left:-12px;
    background: radial-gradient(circle at 35% 30%, var(--accent-strong), var(--accent));
    border-radius:50%; transform: translateY(-50%);
    box-shadow: 0 4px 14px -4px rgba(0,0,0,0.6);
    cursor:grab; touch-action:none;
  }
  .slider-knob:active{ cursor:grabbing; }

  /* Final journal */
  .bar-row{ margin-bottom:16px; }
  .bar-row .bar-head{ display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:6px; }
  .bar-outer{ height:10px; border-radius:8px; background:rgba(255,255,255,0.07); overflow:hidden; }
  .bar-inner{ height:100%; width:0%; border-radius:8px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1.1s var(--ease); }
  .insight-block{
    border-left:3px solid var(--accent);
    padding: 4px 0 4px 18px; margin: 22px 0;
  }
  .tag-pill{
    display:inline-block; font-size:0.72rem; letter-spacing:0.06em; text-transform:uppercase;
    padding:4px 10px; border-radius:999px; background: rgba(143,184,157,0.16); color:var(--accent-strong);
    margin-right:8px; margin-bottom:6px;
  }

  footer.credit{
    text-align:center; padding: 18px; font-size:0.75rem; color:var(--ink-faint);
  }

  @media (max-width: 560px){
    .mode-picker{ flex-direction:column; }
    .drag-label{ font-size:0.92rem; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
  }
  body.reduced-motion #screen{ animation:none; }
</style>
</head>
<body>
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<div id="app">
  <nav id="progress-rail" aria-label="Progress">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-meta">
      <span id="progress-label">Beginning</span>
      <span id="sub-dots"></span>
    </div>
  </nav>

  <main>
    <div id="screen" role="region" aria-live="polite"></div>
  </main>

  <footer class="credit">Cognitive Pattern Explorer &middot; a quiet, offline self-reflection · educational only, not a clinical assessment</footer>
</div>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------
     0. State
  --------------------------------------------------------- */
  var TENDENCIES = ["analytical","emotional","overthinking","actionFirst","balanced"];

  var TENDENCY_META = {
    analytical:  { name:"Analytical Thinker", desc:"You often lean on logic, structure, and evidence before you feel settled in a decision. Analysis feels like solid ground beneath you." },
    emotional:   { name:"Emotional Intuitive", desc:"You often listen to what you feel before you listen to what you argue. Emotional signals read to you as trustworthy data, not noise." },
    overthinking:{ name:"Overthinking Loop Style", desc:"You often circle back to a choice long after it's been made, checking it from every angle. This suggests a deep care about getting things right, even when it costs you rest." },
    actionFirst: { name:"Action-First Decision Maker", desc:"You often move first and adjust as new information arrives. Momentum feels safer to you than waiting for certainty that may never fully come." },
    balanced:    { name:"Balanced Reflective Thinker", desc:"You often hold more than one perspective at once, blending logic, feeling, and timing into a steady middle path." }
  };

  var state = {
    mode: "calm",             // calm | stress
    screen: "start",          // start | ch1 | ch2 | ch3 | final
    ch1Index: 0,
    ch1Answers: [],
    scores: { analytical:0, emotional:0, overthinking:0, actionFirst:0, balanced:0 },
    priorityOrder: null,      // array of priority ids in user-ranked order
    spectrumValues: { spec1:50, spec2:50, spec3:50 }
  };

  var SCREEN_ORDER = ["start","ch1","ch2","ch3","final"];

  /* ---------------------------------------------------------
     1. Content data
  --------------------------------------------------------- */
  var CH1_SCENARIOS = [
    {
      id:"q1",
      prompt:"An ambiguous, urgent message lands from your manager late in the day. What's your instinct?",
      options:[
        { label:"Analyze the wording carefully for hidden meaning before replying.", scores:{analytical:2} },
        { label:"Feel a quick jolt of worry and picture what might be wrong.", scores:{emotional:2} },
        { label:"Reply right away asking what's needed, then adjust as you learn more.", scores:{actionFirst:2} },
        { label:"Pause, reread it once, then send a calm clarifying question.", scores:{balanced:2} }
      ]
    },
    {
      id:"q2",
      prompt:"You're choosing between two solid job offers, with no obviously 'right' answer.",
      options:[
        { label:"Build a detailed list weighing every factor side by side.", scores:{analytical:2} },
        { label:"Turn the decision over for days, unable to fully settle either way.", scores:{overthinking:2} },
        { label:"Notice which one feels right before the logic even catches up.", scores:{emotional:2} },
        { label:"Weigh the few factors that matter most, then trust yourself to adapt.", scores:{balanced:2} }
      ]
    },
    {
      id:"q3",
      prompt:"In a group project, two teammates disagree sharply on direction.",
      options:[
        { label:"Lay out each argument's evidence side by side before choosing.", scores:{analytical:2} },
        { label:"Keep replaying the meeting afterward, unsure who was really right.", scores:{overthinking:2} },
        { label:"Suggest picking a direction now, and adjusting course later if needed.", scores:{actionFirst:2} },
        { label:"Ask each person what they value most, then look for common ground.", scores:{balanced:2} }
      ]
    },
    {
      id:"q4",
      prompt:"A trip you planned for months just got cancelled without warning.",
      options:[
        { label:"Let yourself feel the disappointment fully before deciding what's next.", scores:{emotional:2} },
        { label:"Run through every 'what if' about how it could have been avoided.", scores:{overthinking:2} },
        { label:"Start rearranging plans within the hour.", scores:{actionFirst:2} },
        { label:"Feel the letdown, then gently start looking at what's still possible.", scores:{balanced:2} }
      ]
    },
    {
      id:"q5",
      prompt:"You've decided to learn a new skill this year. Your first move is...",
      options:[
        { label:"Research the most efficient learning path before starting anything.", scores:{analytical:2} },
        { label:"Pick whatever pulls at you the most, right now.", scores:{emotional:2} },
        { label:"Consider so many options that you delay actually starting.", scores:{overthinking:2} },
        { label:"Just start today, and figure out the plan as you go.", scores:{actionFirst:2} }
      ]
    }
  ];

  var PRIORITIES = [
    { id:"p_analytical",  label:"Getting it right",            sub:"precision and evidence", tendency:"analytical"  },
    { id:"p_emotional",   label:"How it feels",                 sub:"honoring what stirs in you", tendency:"emotional"   },
    { id:"p_actionFirst", label:"Moving forward quickly",       sub:"momentum over certainty", tendency:"actionFirst" },
    { id:"p_overthinking",label:"Considering every angle",      sub:"leaving nothing unexamined", tendency:"overthinking"},
    { id:"p_balanced",    label:"Keeping a steady balance",     sub:"holding logic and feeling together", tendency:"balanced" }
  ];

  var SPECTRUMS = [
    { id:"spec1", prompt:"When a decision arrives...", left:"Act fast", right:"Deliberate carefully" },
    { id:"spec2", prompt:"When solving a problem...",  left:"Follow the logic", right:"Follow the feeling" },
    { id:"spec3", prompt:"Looking back on choices...", left:"Rarely revisit", right:"Replay it often" }
  ];

  /* ---------------------------------------------------------
     2. Utilities
  --------------------------------------------------------- */
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function el(html){
    var t=document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }
  function addScore(target, amount){
    if(!amount) return;
    state.scores[target] = (state.scores[target]||0) + amount;
  }
  function prefersReducedMotion(){
    return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }

  /* ---------------------------------------------------------
     3. Ambient constellation canvas
  --------------------------------------------------------- */
  var canvas = document.getElementById("bg-canvas");
  var ctx = canvas.getContext("2d");
  var nodes = [];
  var rafId = null;
  var reduced = prefersReducedMotion();

  function resizeCanvas(){
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);
  }

  function initNodes(){
    nodes = [];
    var count = window.innerWidth < 640 ? 22 : 38;
    for(var i=0;i<count;i++){
      nodes.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        vx: (Math.random()-0.5)*0.18,
        vy: (Math.random()-0.5)*0.18,
        r: 1 + Math.random()*1.6
      });
    }
  }

  function getAccentColors(){
    var cs = getComputedStyle(document.body);
    return {
      a: cs.getPropertyValue("--accent").trim() || "#8fb89d",
      b: cs.getPropertyValue("--accent2").trim() || "#e8a657"
    };
  }

  function drawFrame(){
    var w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0,0,w,h);
    var colors = getAccentColors();
    var speed = parseFloat(getComputedStyle(document.body).getPropertyValue("--speed")) || 1;

    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      if(!reduced){
        n.x += n.vx * speed;
        n.y += n.vy * speed;
        if(n.x < -20) n.x = w+20; if(n.x > w+20) n.x = -20;
        if(n.y < -20) n.y = h+20; if(n.y > h+20) n.y = -20;
      }
    }
    for(var i2=0;i2<nodes.length;i2++){
      for(var j=i2+1;j<nodes.length;j++){
        var dx = nodes[i2].x - nodes[j].x, dy = nodes[i2].y - nodes[j].y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        var maxDist = 150;
        if(dist < maxDist){
          ctx.strokeStyle = "rgba(180,210,200," + (0.14 * (1 - dist/maxDist)) + ")";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(nodes[i2].x, nodes[i2].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
    for(var k=0;k<nodes.length;k++){
      var nn = nodes[k];
      ctx.beginPath();
      ctx.fillStyle = k % 2 === 0 ? colors.a : colors.b;
      ctx.globalAlpha = 0.55;
      ctx.arc(nn.x, nn.y, nn.r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function loop(){
    drawFrame();
    if(!reduced){ rafId = requestAnimationFrame(loop); }
  }

  function startCanvas(){
    resizeCanvas();
    initNodes();
    if(reduced){ drawFrame(); }
    else { if(rafId) cancelAnimationFrame(rafId); loop(); }
  }
  window.addEventListener("resize", function(){ resizeCanvas(); initNodes(); });

  /* ---------------------------------------------------------
     4. Progress rail
  --------------------------------------------------------- */
  var LABELS = { start:"Beginning", ch1:"Chapter 1 · Your Style", ch2:"Chapter 2 · Your Priorities", ch3:"Chapter 3 · Map Your Thinking", final:"Reflection Journal" };

  function renderProgress(){
    var idx = SCREEN_ORDER.indexOf(state.screen);
    var pct = (idx/(SCREEN_ORDER.length-1))*100;
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("progress-label").textContent = LABELS[state.screen];
    var dotsWrap = document.getElementById("sub-dots");
    dotsWrap.innerHTML = "";
    if(state.screen === "ch1"){
      CH1_SCENARIOS.forEach(function(_, i){
        var d = document.createElement("span");
        if(i <= state.ch1Index) d.className = "on";
        dotsWrap.appendChild(d);
      });
    }
  }

  /* ---------------------------------------------------------
     5. Screen: Start
  --------------------------------------------------------- */
  function renderStart(){
    var root = document.getElementById("screen");
    root.innerHTML =
      '<div class="card">' +
        '<div class="hero-mark">' + markSVG() + '</div>' +
        '<p class="eyebrow">A quiet interactive exploration</p>' +
        '<h1>Cognitive Pattern Explorer</h1>' +
        '<p class="lede">Wander through a few small scenarios, some cards to sort, and a timeline to shape. Along the way you\'ll notice threads in how you tend to think &mdash; not a verdict, just a mirror.</p>' +
        '<p>This is educational and reflective only. It does not diagnose or clinically assess anything about you.</p>' +
        '<h3 style="margin-top:28px;">Choose how the space should feel</h3>' +
        '<div class="mode-picker" id="mode-picker"></div>' +
        '<div class="row end">' +
          '<button class="btn" id="start-btn">Begin exploring</button>' +
        '</div>' +
      '</div>';

    var picker = document.getElementById("mode-picker");
    var modes = [
      { id:"calm", title:"Calm Mode", desc:"Slower motion, softer palette, unhurried pacing." },
      { id:"stress", title:"Focused Mode", desc:"Slightly brisker pace and warmer tones." }
    ];
    modes.forEach(function(m){
      var btn = el('<button class="mode-btn" type="button" role="radio"><span class="dot"></span><strong>'+m.title+'</strong><span class="desc">'+m.desc+'</span></button>');
      btn.setAttribute("aria-checked", state.mode === m.id ? "true" : "false");
      if(state.mode === m.id) btn.classList.add("selected");
      btn.addEventListener("click", function(){
        state.mode = m.id;
        applyTheme();
        renderStart();
      });
      picker.appendChild(btn);
    });

    document.getElementById("start-btn").addEventListener("click", function(){
      goTo("ch1");
    });
  }

  function markSVG(){
    return '<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
      '<circle cx="20" cy="18" r="4" fill="var(--accent)"/>' +
      '<circle cx="46" cy="14" r="3" fill="var(--accent2)"/>' +
      '<circle cx="50" cy="42" r="4" fill="var(--accent)"/>' +
      '<circle cx="16" cy="46" r="3" fill="var(--accent2)"/>' +
      '<circle cx="32" cy="32" r="5" fill="var(--accent-strong)"/>' +
      '<path d="M20 18 L32 32 M46 14 L32 32 M50 42 L32 32 M16 46 L32 32" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>' +
    '</svg>';
  }

  function applyTheme(){
    document.body.classList.toggle("theme-stress", state.mode === "stress");
    document.body.classList.toggle("theme-calm", state.mode === "calm");
  }

  /* ---------------------------------------------------------
     6. Screen: Chapter 1 - scenarios
  --------------------------------------------------------- */
  function renderCh1(){
    var root = document.getElementById("screen");
    var q = CH1_SCENARIOS[state.ch1Index];
    var alreadyAnswered = state.ch1Answers[state.ch1Index];

    root.innerHTML =
      '<div class="card">' +
        '<p class="eyebrow">Chapter 1 &middot; Discover Your Thinking Style &middot; Scenario ' + (state.ch1Index+1) + ' of ' + CH1_SCENARIOS.length + '</p>' +
        '<h2>' + q.prompt + '</h2>' +
        '<div class="options" id="options-wrap"></div>' +
        '<div class="row between" style="margin-top:26px;">' +
          '<button class="btn ghost" id="ch1-back" ' + (state.ch1Index===0 ? "disabled" : "") + '>Back</button>' +
          '<button class="btn" id="ch1-next" disabled>Continue</button>' +
        '</div>' +
      '</div>';

    var wrap = document.getElementById("options-wrap");
    var letters = ["A","B","C","D"];
    q.options.forEach(function(opt, i){
      var card = el('<button class="option-card" type="button"><span class="option-letter">'+letters[i]+'</span>' + opt.label + '</button>');
      if(alreadyAnswered === i) card.classList.add("chosen");
      card.addEventListener("click", function(){
        wrap.querySelectorAll(".option-card").forEach(function(c){ c.classList.remove("chosen"); });
        card.classList.add("chosen");
        state.ch1Answers[state.ch1Index] = i;
        document.getElementById("ch1-next").removeAttribute("disabled");
      });
      wrap.appendChild(card);
    });

    if(alreadyAnswered !== undefined){
      document.getElementById("ch1-next").removeAttribute("disabled");
    }

    document.getElementById("ch1-back").addEventListener("click", function(){
      if(state.ch1Index === 0) return;
      state.ch1Index--;
      renderCh1(); renderProgress();
    });
    document.getElementById("ch1-next").addEventListener("click", function(){
      if(state.ch1Index < CH1_SCENARIOS.length - 1){
        state.ch1Index++;
        renderCh1(); renderProgress();
      } else {
        applyCh1Scores();
        goTo("ch2");
      }
    });
  }

  function applyCh1Scores(){
    TENDENCIES.forEach(function(t){ state.scores[t] = 0; }); // ensure clean recompute on revisit
    CH1_SCENARIOS.forEach(function(q, i){
      var chosenIdx = state.ch1Answers[i];
      if(chosenIdx === undefined) return;
      var scores = q.options[chosenIdx].scores;
      Object.keys(scores).forEach(function(k){ addScore(k, scores[k]); });
    });
  }

  /* ---------------------------------------------------------
     7. Screen: Chapter 2 - draggable priority cards
  --------------------------------------------------------- */
  function renderCh2(){
    var root = document.getElementById("screen");
    if(!state.priorityOrder){
      state.priorityOrder = PRIORITIES.map(function(p){ return p.id; });
    }
    root.innerHTML =
      '<div class="card">' +
        '<p class="eyebrow">Chapter 2 &middot; Choose Your Priorities</p>' +
        '<h2>Drag to rank what matters most to you</h2>' +
        '<p>Reorder the cards from what feels most important (top) to least important (bottom) when you\'re facing a decision. Use the up/down buttons if you\'d rather not drag.</p>' +
        '<ul id="priority-list"></ul>' +
        '<div class="row between" style="margin-top:26px;">' +
          '<button class="btn ghost" id="ch2-back">Back</button>' +
          '<button class="btn" id="ch2-next">Continue</button>' +
        '</div>' +
      '</div>';

    renderPriorityList();

    document.getElementById("ch2-back").addEventListener("click", function(){ goTo("ch1"); });
    document.getElementById("ch2-next").addEventListener("click", function(){
      applyCh2Scores();
      goTo("ch3");
    });
  }

  function renderPriorityList(){
    var list = document.getElementById("priority-list");
    list.innerHTML = "";
    state.priorityOrder.forEach(function(id, idx){
      var p = PRIORITIES.filter(function(x){ return x.id === id; })[0];
      var item = el(
        '<li class="drag-item" draggable="true" tabindex="0" data-id="'+p.id+'" role="listitem" aria-label="'+p.label+', rank '+(idx+1)+' of '+state.priorityOrder.length+'">' +
          '<span class="drag-rank">'+(idx+1)+'</span>' +
          '<span class="drag-grip" aria-hidden="true"></span>' +
          '<span class="drag-label">'+p.label+'<small>'+p.sub+'</small></span>' +
          '<button class="icon-btn" type="button" data-dir="up" aria-label="Move '+p.label+' up">&uarr;</button>' +
          '<button class="icon-btn" type="button" data-dir="down" aria-label="Move '+p.label+' down">&darr;</button>' +
        '</li>'
      );
      list.appendChild(item);
    });

    // keyboard + button based reordering (accessible fallback for drag)
    list.querySelectorAll(".icon-btn").forEach(function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        var li = btn.closest(".drag-item");
        moveItemInOrder(li.getAttribute("data-id"), btn.getAttribute("data-dir"));
      });
    });
    list.querySelectorAll(".drag-item").forEach(function(item){
      item.addEventListener("keydown", function(e){
        if(e.key === "ArrowUp"){ e.preventDefault(); moveItemInOrder(item.getAttribute("data-id"), "up"); focusItemLater(item.getAttribute("data-id")); }
        if(e.key === "ArrowDown"){ e.preventDefault(); moveItemInOrder(item.getAttribute("data-id"), "down"); focusItemLater(item.getAttribute("data-id")); }
      });
    });

    makeSortableList(list, function(newOrderIds){
      state.priorityOrder = newOrderIds;
      renderPriorityList();
    });
  }

  function focusItemLater(id){
    requestAnimationFrame(function(){
      var target = document.querySelector('.drag-item[data-id="'+id+'"]');
      if(target) target.focus();
    });
  }

  function moveItemInOrder(id, dir){
    var arr = state.priorityOrder;
    var i = arr.indexOf(id);
    if(i === -1) return;
    var j = dir === "up" ? i-1 : i+1;
    if(j < 0 || j >= arr.length) return;
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    renderPriorityList();
    focusItemLater(id);
  }

  // Generic reusable drag-and-drop sortable list (native DnD + touch fallback)
  function makeSortableList(listEl, onChange){
    var dragEl = null;
    var touchDragEl = null;

    function getDragAfterElement(container, y){
      var els = Array.prototype.slice.call(container.querySelectorAll(".drag-item:not(.dragging)"));
      var closest = { offset: -Infinity, element: null };
      els.forEach(function(child){
        var box = child.getBoundingClientRect();
        var offset = y - box.top - box.height/2;
        if(offset < 0 && offset > closest.offset){ closest = { offset: offset, element: child }; }
      });
      return closest.element;
    }

    function currentOrder(){
      return Array.prototype.slice.call(listEl.querySelectorAll(".drag-item")).map(function(li){ return li.getAttribute("data-id"); });
    }

    listEl.querySelectorAll(".drag-item").forEach(function(item){
      item.addEventListener("dragstart", function(){
        dragEl = item;
        requestAnimationFrame(function(){ item.classList.add("dragging"); });
      });
      item.addEventListener("dragend", function(){
        item.classList.remove("dragging");
        dragEl = null;
        onChange(currentOrder());
      });
      item.addEventListener("touchstart", function(){
        touchDragEl = item;
        item.classList.add("dragging");
      }, { passive:true });
    });

    listEl.addEventListener("dragover", function(e){
      e.preventDefault();
      if(!dragEl) return;
      var after = getDragAfterElement(listEl, e.clientY);
      if(after == null) listEl.appendChild(dragEl); else listEl.insertBefore(dragEl, after);
    });

    listEl.addEventListener("touchmove", function(e){
      if(!touchDragEl) return;
      e.preventDefault();
      var touch = e.touches[0];
      var after = getDragAfterElement(listEl, touch.clientY);
      if(after == null) listEl.appendChild(touchDragEl); else listEl.insertBefore(touchDragEl, after);
    }, { passive:false });

    listEl.addEventListener("touchend", function(){
      if(touchDragEl){
        touchDragEl.classList.remove("dragging");
        touchDragEl = null;
        onChange(currentOrder());
      }
    });
  }

  function applyCh2Scores(){
    var n = state.priorityOrder.length;
    state.priorityOrder.forEach(function(id, idx){
      var p = PRIORITIES.filter(function(x){ return x.id === id; })[0];
      var weight = (n - idx - 1); // top rank gets highest weight
      addScore(p.tendency, weight);
    });
  }

  /* ---------------------------------------------------------
     8. Screen: Chapter 3 - draggable timeline sliders
  --------------------------------------------------------- */
  function renderCh3(){
    var root = document.getElementById("screen");
    root.innerHTML =
      '<div class="card">' +
        '<p class="eyebrow">Chapter 3 &middot; Map Your Thinking</p>' +
        '<h2>Slide each marker to where you tend to sit</h2>' +
        '<p>There\'s no correct position &mdash; only where it feels honest today. Use your mouse, finger, or arrow keys.</p>' +
        '<div id="spectrum-wrap"></div>' +
        '<div class="row between" style="margin-top:26px;">' +
          '<button class="btn ghost" id="ch3-back">Back</button>' +
          '<button class="btn" id="ch3-next">See my reflection</button>' +
        '</div>' +
      '</div>';

    var wrap = document.getElementById("spectrum-wrap");
    SPECTRUMS.forEach(function(spec){
      var block = el(
        '<div class="spectrum">' +
          '<p class="spectrum-prompt">'+spec.prompt+'</p>' +
          '<div class="spectrum-labels"><span>'+spec.left+'</span><span>'+spec.right+'</span></div>' +
          '<div class="slider-track" id="track-'+spec.id+'">' +
            '<div class="slider-fill" id="fill-'+spec.id+'"></div>' +
            '<div class="slider-knob" id="knob-'+spec.id+'" role="slider" tabindex="0" ' +
              'aria-valuemin="0" aria-valuemax="100" aria-valuenow="'+state.spectrumValues[spec.id]+'" ' +
              'aria-label="'+spec.prompt+' from '+spec.left+' to '+spec.right+'"></div>' +
          '</div>' +
        '</div>'
      );
      wrap.appendChild(block);
      buildSlider(spec.id);
    });

    document.getElementById("ch3-back").addEventListener("click", function(){ goTo("ch2"); });
    document.getElementById("ch3-next").addEventListener("click", function(){
      applyCh3Scores();
      goTo("final");
    });
  }

  // Reusable slider component: mouse drag + touch fallback + keyboard
  function buildSlider(specId){
    var track = document.getElementById("track-"+specId);
    var knob = document.getElementById("knob-"+specId);
    var fill = document.getElementById("fill-"+specId);

    function setValue(v, announce){
      v = clamp(Math.round(v), 0, 100);
      state.spectrumValues[specId] = v;
      knob.style.left = v + "%";
      fill.style.width = v + "%";
      knob.setAttribute("aria-valuenow", v);
    }

    function valueFromClientX(clientX){
      var rect = track.getBoundingClientRect();
      var pct = ((clientX - rect.left) / rect.width) * 100;
      return clamp(pct, 0, 100);
    }

    setValue(state.spectrumValues[specId]);

    var dragging = false;

    function onMouseMove(e){ if(!dragging) return; setValue(valueFromClientX(e.clientX)); }
    function onMouseUp(){ dragging = false; document.removeEventListener("mousemove", onMouseMove); document.removeEventListener("mouseup", onMouseUp); }

    knob.addEventListener("mousedown", function(e){
      dragging = true; e.preventDefault();
      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    });
    track.addEventListener("mousedown", function(e){
      if(e.target === knob) return;
      setValue(valueFromClientX(e.clientX));
    });

    // touch fallback
    knob.addEventListener("touchstart", function(){ dragging = true; }, { passive:true });
    knob.addEventListener("touchmove", function(e){
      if(!dragging) return;
      e.preventDefault();
      setValue(valueFromClientX(e.touches[0].clientX));
    }, { passive:false });
    knob.addEventListener("touchend", function(){ dragging = false; });
    track.addEventListener("touchstart", function(e){
      if(e.target === knob) return;
      setValue(valueFromClientX(e.touches[0].clientX));
    }, { passive:true });

    // keyboard
    knob.addEventListener("keydown", function(e){
      var v = state.spectrumValues[specId];
      if(e.key === "ArrowLeft" || e.key === "ArrowDown"){ e.preventDefault(); setValue(v - 5); }
      else if(e.key === "ArrowRight" || e.key === "ArrowUp"){ e.preventDefault(); setValue(v + 5); }
      else if(e.key === "Home"){ e.preventDefault(); setValue(0); }
      else if(e.key === "End"){ e.preventDefault(); setValue(100); }
    });
  }

  function applyCh3Scores(){
    var v1 = state.spectrumValues.spec1; // act fast(0) <-> deliberate(100)
    addScore("actionFirst", Math.max(0, (50 - v1)/50) * 3);
    addScore("overthinking", Math.max(0, (v1 - 50)/50) * 3);
    addScore("balanced", (1 - Math.abs(v1 - 50)/50) * 3);

    var v2 = state.spectrumValues.spec2; // logic(0) <-> feeling(100)
    addScore("analytical", Math.max(0, (50 - v2)/50) * 3);
    addScore("emotional", Math.max(0, (v2 - 50)/50) * 3);
    addScore("balanced", (1 - Math.abs(v2 - 50)/50) * 1);

    var v3 = state.spectrumValues.spec3; // rarely revisit(0) <-> replay often(100)
    addScore("overthinking", Math.max(0, (v3 - 50)/50) * 3);
    addScore("actionFirst", Math.max(0, (50 - v3)/50) * 1);
    addScore("balanced", (1 - Math.abs(v3 - 50)/50) * 1);
  }

  /* ---------------------------------------------------------
     9. Screen: Final reflection journal
  --------------------------------------------------------- */
  function renderFinal(){
    var root = document.getElementById("screen");
    var total = TENDENCIES.reduce(function(sum,t){ return sum + Math.max(0,state.scores[t]); }, 0);
    var percentages = {};
    TENDENCIES.forEach(function(t){
      percentages[t] = total > 0 ? (Math.max(0,state.scores[t]) / total) * 100 : (100/TENDENCIES.length);
    });

    var sorted = TENDENCIES.slice().sort(function(a,b){ return percentages[b] - percentages[a]; });
    var top = sorted[0], second = sorted[1];

    root.innerHTML =
      '<div class="card">' +
        '<p class="eyebrow">Your Reflection Journal</p>' +
        '<h2>A snapshot of how you tend to think</h2>' +
        '<p>These percentages describe leanings noticed across today\'s scenarios &mdash; not fixed traits, and not a diagnosis. People shift with context, mood, and rest.</p>' +
        '<div id="bars" style="margin-top:22px;"></div>' +
        '<div class="insight-block" id="insight-block"></div>' +
        '<div class="row" style="margin-top:8px;">' +
          '<span class="tag-pill">' + TENDENCY_META[top].name + '</span>' +
          '<span class="tag-pill">' + TENDENCY_META[second].name + '</span>' +
        '</div>' +
        '<div class="row between" style="margin-top:30px;">' +
          '<button class="btn ghost" id="restart-btn">Start over</button>' +
          '<button class="btn" id="save-btn">Save this reflection</button>' +
        '</div>' +
      '</div>';

    var barsWrap = document.getElementById("bars");
    sorted.forEach(function(t){
      var row = el(
        '<div class="bar-row">' +
          '<div class="bar-head"><span>'+TENDENCY_META[t].name+'</span><span>'+Math.round(percentages[t])+'%</span></div>' +
          '<div class="bar-outer"><div class="bar-inner" id="bar-'+t+'"></div></div>' +
        '</div>'
      );
      barsWrap.appendChild(row);
    });
    requestAnimationFrame(function(){
      sorted.forEach(function(t){
        var bar = document.getElementById("bar-"+t);
        if(bar) bar.style.width = percentages[t] + "%";
      });
    });

    document.getElementById("insight-block").innerHTML =
      '<p class="lede">Today, your strongest thread was <strong>' + TENDENCY_META[top].name + '</strong>, with ' + TENDENCY_META[second].name.toLowerCase() + ' showing up close behind.</p>' +
      '<p>' + TENDENCY_META[top].desc + '</p>' +
      '<p>' + TENDENCY_META[second].desc + '</p>' +
      '<p>Together, this suggests that when you\'re at your most natural, you likely reach for ' + TENDENCY_META[top].name.toLowerCase() + ' first, and lean on ' + TENDENCY_META[second].name.toLowerCase() + ' to round it out. Neither is a flaw to fix &mdash; just a pattern worth noticing.</p>';

    document.getElementById("restart-btn").addEventListener("click", function(){
      resetState();
      goTo("start");
    });
    document.getElementById("save-btn").addEventListener("click", function(){
      downloadReflection(percentages, sorted, top, second);
    });
  }

  function downloadReflection(percentages, sorted, top, second){
    var lines = [];
    lines.push("Cognitive Pattern Explorer — Reflection Journal");
    lines.push("Mode: " + (state.mode === "calm" ? "Calm" : "Focused"));
    lines.push("");
    lines.push("Breakdown:");
    sorted.forEach(function(t){
      lines.push("  " + TENDENCY_META[t].name + ": " + Math.round(percentages[t]) + "%");
    });
    lines.push("");
    lines.push("Strongest thread: " + TENDENCY_META[top].name);
    lines.push(TENDENCY_META[top].desc);
    lines.push("");
    lines.push("Close behind: " + TENDENCY_META[second].name);
    lines.push(TENDENCY_META[second].desc);
    lines.push("");
    lines.push("This reflection is educational only and is not a clinical or diagnostic assessment.");

    var blob = new Blob([lines.join("\n")], { type: "text/plain" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "cognitive-pattern-reflection.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  function resetState(){
    state.ch1Index = 0;
    state.ch1Answers = [];
    state.scores = { analytical:0, emotional:0, overthinking:0, actionFirst:0, balanced:0 };
    state.priorityOrder = null;
    state.spectrumValues = { spec1:50, spec2:50, spec3:50 };
  }

  /* ---------------------------------------------------------
     10. Router
  --------------------------------------------------------- */
  function goTo(screen){
    state.screen = screen;
    render();
    window.scrollTo({ top:0, behavior: reduced ? "auto" : "smooth" });
  }

  function render(){
    renderProgress();
    if(state.screen === "start") renderStart();
    else if(state.screen === "ch1") renderCh1();
    else if(state.screen === "ch2") renderCh2();
    else if(state.screen === "ch3") renderCh3();
    else if(state.screen === "final") renderFinal();
  }

  /* ---------------------------------------------------------
     11. Init
  --------------------------------------------------------- */
  function init(){
    if(reduced){ document.body.classList.add("reduced-motion"); }
    applyTheme();
    startCanvas();
    render();
  }

  init();
})();
